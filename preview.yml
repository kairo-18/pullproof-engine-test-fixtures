version: 1
services:
  db:
    image: postgres:16-alpine
    port: 5432
    env:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
  api:
    path: ./backend
    port: 4000
    env:
      DATABASE_URL: postgresql://app:app@db:5432/app
  web:
    path: ./frontend
    port: 80
    public: true
    env:
      REACT_APP_API_URL: http://api:4000
